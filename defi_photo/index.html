<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>DARE CAM</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000; color: #fff;
            font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
            max-width: 500px; margin: 0 auto; min-height: 100vh;
            overflow-x: hidden; padding-bottom: 64px;
            -webkit-font-smoothing: antialiased;
        }

        a { color: inherit; text-decoration: none; }

        /* ── Screens ── */
        .screen {
            display: none; min-height: calc(100vh - 64px);
            padding: 20px 16px; padding-top: 20px;
            animation: screenIn 0.3s ease;
        }
        .screen.active { display: block; }
        @keyframes screenIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Bottom Nav ── */
        #navbar {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px;
            background: #000;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; height: 56px; z-index: 200;
        }
        .nav-tab {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: none; border: none; color: #444;
            font-size: 11px; font-weight: 800; letter-spacing: 2px;
            cursor: pointer; position: relative; transition: color 0.2s;
            text-transform: uppercase;
        }
        .nav-tab.active { color: #fff; }
        .nav-tab.active::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 24px; height: 2px; background: #ff0a0a;
        }

        /* ── Cards ── */
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px; margin-bottom: 12px;
        }
        .card-glass {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
        }

        /* ── Buttons ── */
        .btn-primary {
            display: block; width: 100%; padding: 16px;
            background: #ff0a0a; border: none; border-radius: 8px;
            color: #fff; font-size: 14px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; text-align: center;
            transition: transform 0.12s, opacity 0.12s;
        }
        .btn-primary:active { transform: scale(0.97); opacity: 0.85; }

        .btn-secondary {
            display: block; width: 100%; padding: 14px;
            background: transparent; border: 1px solid #333;
            border-radius: 8px; color: #fff;
            font-size: 13px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px;
            cursor: pointer; text-align: center;
            transition: transform 0.12s;
        }
        .btn-secondary:active { transform: scale(0.97); }

        /* ── HOME ── */
        .home-title {
            font-size: 13px; font-weight: 800; letter-spacing: 4px;
            text-transform: uppercase; color: #666;
            text-align: center; margin-bottom: 32px; margin-top: 12px;
        }

        .challenge-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 32px 24px; text-align: center;
            margin-bottom: 24px;
        }
        .challenge-label {
            font-size: 11px; font-weight: 800; letter-spacing: 3px;
            text-transform: uppercase; color: #ff0a0a; margin-bottom: 20px;
        }
        .challenge-text {
            font-size: 22px; font-weight: 800; line-height: 1.4;
            color: #fff; margin-bottom: 24px;
        }
        .challenge-divider {
            width: 40px; height: 2px; background: #ff0a0a;
            margin: 0 auto 20px;
        }
        .countdown {
            font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
            font-size: 28px; font-weight: 700;
            color: #fff; letter-spacing: 3px;
        }
        .countdown-label {
            font-size: 10px; letter-spacing: 2px;
            text-transform: uppercase; color: #444; margin-top: 6px;
        }

        .invite-link {
            display: block; text-align: center;
            margin-top: 16px; color: #666;
            font-size: 12px; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; transition: color 0.2s;
        }
        .invite-link:active { color: #999; }

        /* ── CAMERA ── */
        #screen-camera {
            padding: 0; position: relative;
            background: #000; min-height: 100vh;
        }
        #camera-video {
            width: 100%; height: 100vh;
            object-fit: cover; display: block;
        }
        #camera-canvas { display: none; }

        .camera-btn-close {
            position: absolute; top: 16px; left: 16px;
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.5); border: none;
            border-radius: 50%; color: #fff;
            font-size: 18px; font-weight: 300;
            cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .camera-btn-flip {
            position: absolute; top: 16px; right: 16px;
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.5); border: none;
            border-radius: 50%; color: #fff;
            font-size: 14px; font-weight: 600;
            cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .camera-capture {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 72px; height: 72px;
            background: #fff; border: none; border-radius: 50%;
            cursor: pointer; z-index: 10;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.3);
            transition: transform 0.1s;
        }
        .camera-capture:active { transform: translateX(-50%) scale(0.92); }

        .preview-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 20; display: none;
            flex-direction: column; background: #000;
        }
        .preview-overlay.active { display: flex; }
        .preview-img {
            flex: 1; width: 100%; object-fit: cover;
        }
        .preview-actions {
            display: flex; gap: 12px;
            padding: 20px 16px;
            background: #000;
        }
        .preview-actions .btn-primary,
        .preview-actions .btn-secondary { flex: 1; }

        /* ── FEED ── */
        .feed-title {
            font-size: 24px; font-weight: 800; letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 24px;
        }

        .feed-card {
            margin-bottom: 0;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 16px;
        }
        .feed-photo {
            width: 100%; aspect-ratio: 4/3;
            border-radius: 8px; margin-bottom: 12px;
            display: block; object-fit: cover;
        }
        .feed-photo-placeholder {
            width: 100%; aspect-ratio: 4/3;
            border-radius: 8px; margin-bottom: 12px;
        }
        .feed-meta {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px;
        }
        .feed-user {
            font-size: 14px; font-weight: 800;
            letter-spacing: 0.5px;
        }
        .feed-time {
            font-size: 12px; color: #666;
        }
        .vote-bar {
            display: flex; gap: 10px;
        }
        .vote-btn {
            flex: 1; padding: 10px;
            border-radius: 6px; border: none;
            font-size: 12px; font-weight: 800;
            letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; text-align: center;
            transition: transform 0.1s, opacity 0.15s;
        }
        .vote-btn:active { transform: scale(0.96); }
        .vote-btn-up {
            background: rgba(0,210,106,0.15); color: #00d26a;
            border: 1px solid rgba(0,210,106,0.3);
        }
        .vote-btn-up.voted {
            background: #00d26a; color: #000;
        }
        .vote-btn-down {
            background: rgba(255,10,10,0.15); color: #ff0a0a;
            border: 1px solid rgba(255,10,10,0.3);
        }
        .vote-btn-down.voted {
            background: #ff0a0a; color: #fff;
        }

        /* ── TOP 3 ── */
        .top-title {
            font-size: 24px; font-weight: 800; letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 4px;
        }
        .top-date {
            font-size: 12px; color: #666; letter-spacing: 1px;
            margin-bottom: 24px;
        }

        .top-card {
            display: flex; align-items: center; gap: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px; margin-bottom: 10px;
            transition: transform 0.12s;
        }
        .top-card:first-of-type {
            padding: 20px;
            border-color: rgba(255,10,10,0.3);
        }
        .top-rank {
            font-size: 28px; font-weight: 900;
            color: #333; min-width: 36px; text-align: center;
        }
        .top-card:first-of-type .top-rank {
            color: #ff0a0a; font-size: 34px;
        }
        .top-photo {
            width: 56px; height: 56px;
            border-radius: 8px; object-fit: cover; flex-shrink: 0;
        }
        .top-photo-placeholder {
            width: 56px; height: 56px;
            border-radius: 8px; flex-shrink: 0;
        }
        .top-card:first-of-type .top-photo,
        .top-card:first-of-type .top-photo-placeholder {
            width: 72px; height: 72px;
        }
        .top-info { flex: 1; }
        .top-user {
            font-size: 14px; font-weight: 800;
            letter-spacing: 0.5px; margin-bottom: 2px;
        }
        .top-votes {
            font-size: 12px; color: #666;
        }

        .top-section-label {
            font-size: 11px; font-weight: 800; letter-spacing: 3px;
            text-transform: uppercase; color: #444;
            margin-top: 32px; margin-bottom: 14px;
        }

        .top-compact {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .top-compact-rank {
            font-size: 14px; font-weight: 800; color: #444;
            min-width: 20px;
        }
        .top-compact-user {
            flex: 1; font-size: 13px; font-weight: 700;
        }
        .top-compact-votes {
            font-size: 12px; color: #666;
        }

        /* ── PROFILE ── */
        .profile-title {
            font-size: 24px; font-weight: 800; letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 28px;
        }

        .profile-field label {
            display: block; font-size: 11px; font-weight: 800;
            letter-spacing: 2px; text-transform: uppercase;
            color: #666; margin-bottom: 8px;
        }
        .profile-field input {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: #fff;
            font-size: 16px; font-weight: 600;
            outline: none; transition: border-color 0.2s;
        }
        .profile-field input:focus {
            border-color: #ff0a0a;
        }
        .profile-field { margin-bottom: 24px; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 32px;
        }
        .stat-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 16px;
            text-align: center;
        }
        .stat-val {
            font-size: 24px; font-weight: 900;
        }
        .stat-label {
            font-size: 10px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            color: #666; margin-top: 4px;
        }

        .profile-link {
            display: block; text-align: center;
            color: #666; font-size: 12px; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            margin-top: 16px; cursor: pointer;
            transition: color 0.2s;
        }
        .profile-link:active { color: #fff; }

        .btn-danger {
            display: block; width: 100%; padding: 14px;
            background: transparent; border: 1px solid #331010;
            border-radius: 8px; color: #ff0a0a;
            font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px;
            cursor: pointer; text-align: center;
            margin-top: 12px;
        }

        /* ── Settings icon ── */
        .settings-icon {
            position: absolute; top: 20px; right: 16px;
            background: none; border: none;
            color: #444; cursor: pointer;
            font-size: 13px; font-weight: 700;
            letter-spacing: 1px; z-index: 10;
        }
        .settings-icon:active { color: #fff; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 0; }

        /* ── Empty state ── */
        .empty-state {
            text-align: center; padding: 48px 20px;
            color: #444; font-size: 13px; font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<!-- ── HOME ── -->
<div id="screen-home" class="screen active">
    <button class="settings-icon" onclick="showScreen('profile')">PROFIL</button>
    <div class="home-title">DARE CAM</div>
    <div class="challenge-card">
        <div class="challenge-label" id="challenge-label">DEFI #1</div>
        <div class="challenge-text" id="challenge-text"></div>
        <div class="challenge-divider"></div>
        <div class="countdown" id="countdown">00:00:00</div>
        <div class="countdown-label">AVANT LE PROCHAIN DEFI</div>
    </div>
    <button class="btn-primary" onclick="openCamera()">PRENDRE LA PHOTO</button>
    <div class="invite-link" onclick="shareApp()">Inviter</div>
</div>

<!-- ── CAMERA ── -->
<div id="screen-camera" class="screen">
    <video id="camera-video" autoplay playsinline></video>
    <canvas id="camera-canvas"></canvas>
    <button class="camera-btn-close" onclick="closeCamera()">&#x2715;</button>
    <button class="camera-btn-flip" onclick="flipCamera()">&#x21BB;</button>
    <button class="camera-capture" onclick="capturePhoto()"></button>

    <div class="preview-overlay" id="preview-overlay">
        <img class="preview-img" id="preview-img" src="" alt="">
        <div class="preview-actions">
            <button class="btn-secondary" onclick="retakePhoto()">REFAIRE</button>
            <button class="btn-primary" onclick="submitPhoto()">ENVOYER</button>
        </div>
    </div>
</div>

<!-- ── FEED ── -->
<div id="screen-feed" class="screen">
    <div class="feed-title">FEED</div>
    <div id="feed-list"></div>
</div>

<!-- ── TOP 3 ── -->
<div id="screen-top" class="screen">
    <div class="top-title">TOP 3</div>
    <div class="top-date" id="top-date"></div>
    <div id="top-today"></div>
    <div class="top-section-label">HIER</div>
    <div id="top-yesterday"></div>
</div>

<!-- ── PROFILE ── -->
<div id="screen-profile" class="screen">
    <div class="profile-title">PROFIL</div>
    <div class="profile-field">
        <label>Nom d'utilisateur</label>
        <input type="text" id="username-input" maxlength="20" placeholder="Ton pseudo..." oninput="saveUsername()">
    </div>
    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-val" id="stat-photos">0</div>
            <div class="stat-label">Photos</div>
        </div>
        <div class="stat-box">
            <div class="stat-val" id="stat-votes">0</div>
            <div class="stat-label">Votes</div>
        </div>
        <div class="stat-box">
            <div class="stat-val" id="stat-top3">0</div>
            <div class="stat-label">Top 3</div>
        </div>
    </div>
    <a href="../index.html" class="btn-secondary" style="text-decoration:none; margin-bottom:12px;">RETOUR</a>
    <button class="btn-danger" onclick="resetData()">RESET TOUTES LES DONNEES</button>
    <div class="profile-link" onclick="showScreen('home')">Retour au defi</div>
</div>

<!-- ── Bottom Nav ── -->
<nav id="navbar">
    <div class="nav-tab active" onclick="showScreen('home')">DEFI</div>
    <div class="nav-tab" onclick="openCamera()">SHOOT</div>
    <div class="nav-tab" onclick="showScreen('feed')">FEED</div>
    <div class="nav-tab" onclick="showScreen('top')">TOP 3</div>
</nav>

<script>
// ─── CHALLENGES ───
const CHALLENGES = [
    'Photographie la personne avec le pire style vestimentaire que tu croises',
    'Trouve et photographie les toilettes publiques les plus immondes',
    'Photographie le plat le plus degueulasse que tu vois aujourd\'hui',
    'Photographie quelqu\'un qui se la raconte grave en public',
    'Photographie le pire tatouage que tu apercois',
    'Photographie la coupe de cheveux la plus catastrophique',
    'Photographie le maquillage le plus rate que tu croises',
    'Photographie le pire combo vestimentaire (chaussettes-sandales etc)',
    'Photographie le mec ou la meuf qui bloque tout le trottoir',
    'Photographie la terrasse de cafe la plus miteuse',
    'Photographie la bouffe la plus suspecte en vitrine',
    'Photographie le vehicule le plus detruit qui roule encore',
    'Photographie le pire graffiti de ta ville',
    'Photographie la deco interieure la plus horrible que tu vois',
    'Photographie la pub la plus cringe affichee quelque part',
    'Photographie le banc public le plus explose',
    'Photographie quelqu\'un qui mange un truc immonde dans la rue',
    'Photographie la file d\'attente la plus absurde',
    'Photographie l\'objet le plus inutile en vente dans un magasin',
    'Photographie le truc le plus random abandonne sur le trottoir',
    'Photographie le pire menu affiche devant un resto',
    'Photographie la poubelle la plus debordante que tu trouves',
    'Photographie quelqu\'un en plein selfie ridicule',
    'Photographie le parking le plus chaotique',
    'Photographie la pire vitrine de magasin',
    'Photographie le bronzage le plus rate',
    'Photographie le nom de commerce le plus WTF',
    'Photographie le panneau le plus absurde que tu trouves',
    'Photographie la personne qui a l\'air le plus en PLS',
    'Photographie le truc le plus flippant dans un magasin',
    'Photographie le pire stationnement que tu vois',
    'Photographie la chose qui ne devrait pas exister mais qui est la',
    'Photographie le sol le plus degueulasse que tu trouves',
    'Photographie le pire animal de compagnie que tu croises',
    'Photographie l\'escalier ou l\'ascenseur le plus sketchy',
    'Photographie le cablage electrique le plus dangereux',
    'Photographie la chaise la plus defoncee encore utilisee',
    'Photographie le distributeur automatique le plus suspect',
    'Photographie le truc le plus bizarre colle sur un poteau',
    'Photographie la pire facade d\'immeuble de ta journee'
];

const FAKE_USERS = ['LeBGdu93','ZakLeRat','MedBroly','SkinnyLegend','LaFouine77','DemonSlayer','KingRat','SnakeEyes'];

const DARK_GRADIENTS = [
    'linear-gradient(135deg, #1a0000, #330000)',
    'linear-gradient(135deg, #0d0d0d, #1a1a1a)',
    'linear-gradient(135deg, #150015, #2a002a)',
    'linear-gradient(135deg, #0a0a0a, #1f1010)',
    'linear-gradient(135deg, #0d0a15, #1a0d2a)',
    'linear-gradient(135deg, #1a1000, #2a1a00)',
    'linear-gradient(135deg, #001010, #002020)',
    'linear-gradient(135deg, #100a0a, #201515)',
];

// ─── STATE ───
let currentScreen = 'home';
let cameraStream = null;
let facingMode = 'environment';
let capturedData = null;

// ─── CHALLENGE OF THE DAY ───
function getDayOfYear() {
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    const diff = now - start;
    return Math.floor(diff / 86400000);
}

const dayOfYear = getDayOfYear();
const todayIdx = dayOfYear % CHALLENGES.length;
const todayChallenge = CHALLENGES[todayIdx];

// ─── INIT ───
function init() {
    document.getElementById('challenge-label').textContent = 'DEFI #' + (todayIdx + 1);
    document.getElementById('challenge-text').textContent = todayChallenge;

    if (!localStorage.getItem('dc_username')) {
        localStorage.setItem('dc_username', 'User' + Math.floor(Math.random() * 9999));
    }
    document.getElementById('username-input').value = localStorage.getItem('dc_username') || '';

    generateFakeSubmissions();
    updateCountdown();
    setInterval(updateCountdown, 1000);
    renderFeed();
    renderTop();
    updateStats();
}

// ─── COUNTDOWN ───
function updateCountdown() {
    const now = new Date();
    const midnight = new Date(now);
    midnight.setHours(24, 0, 0, 0);
    const diff = midnight - now;
    const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
    const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
    const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
    document.getElementById('countdown').textContent = h + ':' + m + ':' + s;
}

// ─── NAVIGATION ───
function showScreen(id) {
    if (id === 'camera') { openCamera(); return; }
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');

    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    const tabMap = { home: 0, feed: 2, top: 3 };
    if (tabMap[id] !== undefined) {
        document.querySelectorAll('.nav-tab')[tabMap[id]].classList.add('active');
    }

    document.getElementById('navbar').style.display = (id === 'camera' || id === 'profile') ? 'none' : 'flex';
    currentScreen = id;

    if (id === 'feed') renderFeed();
    if (id === 'top') renderTop();
    if (id === 'profile') updateStats();
}

// ─── CAMERA ───
async function openCamera() {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-camera').classList.add('active');
    document.getElementById('navbar').style.display = 'none';
    document.getElementById('preview-overlay').classList.remove('active');

    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-tab')[1].classList.add('active');

    currentScreen = 'camera';

    try {
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
        }
        cameraStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 960 } },
            audio: false
        });
        document.getElementById('camera-video').srcObject = cameraStream;
    } catch (e) {
        alert('Impossible d\'acceder a la camera.');
        showScreen('home');
    }
}

function closeCamera() {
    if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
    }
    document.getElementById('camera-video').srcObject = null;
    showScreen('home');
}

async function flipCamera() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    await openCamera();
}

function capturePhoto() {
    const video = document.getElementById('camera-video');
    const canvas = document.getElementById('camera-canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    capturedData = canvas.toDataURL('image/jpeg', 0.8);

    document.getElementById('preview-img').src = capturedData;
    document.getElementById('preview-overlay').classList.add('active');
}

function retakePhoto() {
    capturedData = null;
    document.getElementById('preview-overlay').classList.remove('active');
}

function submitPhoto() {
    if (!capturedData) return;
    const username = localStorage.getItem('dc_username') || 'Anon';
    const submissions = JSON.parse(localStorage.getItem('dc_submissions') || '[]');
    submissions.push({
        id: Date.now().toString(),
        user: username,
        photo: capturedData,
        day: dayOfYear,
        time: Date.now(),
        votesUp: 0,
        votesDown: 0,
        isFake: false
    });
    localStorage.setItem('dc_submissions', JSON.stringify(submissions));

    const count = parseInt(localStorage.getItem('dc_photo_count') || '0');
    localStorage.setItem('dc_photo_count', (count + 1).toString());

    capturedData = null;
    if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
    }
    showScreen('feed');
}

// ─── FAKE SUBMISSIONS ───
function generateFakeSubmissions() {
    const key = 'dc_fakes_day_' + dayOfYear;
    if (localStorage.getItem(key)) return;

    const submissions = JSON.parse(localStorage.getItem('dc_submissions') || '[]');
    const count = 5 + Math.floor(Math.random() * 2);
    const usedUsers = [];

    for (let i = 0; i < count; i++) {
        let user;
        do { user = FAKE_USERS[Math.floor(Math.random() * FAKE_USERS.length)]; }
        while (usedUsers.includes(user) && usedUsers.length < FAKE_USERS.length);
        usedUsers.push(user);

        const hoursAgo = Math.floor(Math.random() * 14) + 1;
        const gradIdx = Math.floor(Math.random() * DARK_GRADIENTS.length);

        submissions.push({
            id: 'fake_' + dayOfYear + '_' + i,
            user: user,
            photo: null,
            gradient: DARK_GRADIENTS[gradIdx],
            day: dayOfYear,
            time: Date.now() - hoursAgo * 3600000,
            votesUp: Math.floor(Math.random() * 8),
            votesDown: Math.floor(Math.random() * 4),
            isFake: true
        });
    }

    localStorage.setItem('dc_submissions', JSON.stringify(submissions));
    localStorage.setItem(key, '1');
}

// ─── FEED ───
function renderFeed() {
    const submissions = JSON.parse(localStorage.getItem('dc_submissions') || '[]');
    const today = submissions.filter(s => s.day === dayOfYear).sort((a, b) => b.time - a.time);
    const container = document.getElementById('feed-list');

    if (today.length === 0) {
        container.innerHTML = '<div class="empty-state">PAS ENCORE DE PHOTOS</div>';
        return;
    }

    const votes = JSON.parse(localStorage.getItem('dc_votes') || '{}');

    container.innerHTML = today.map(sub => {
        const timeAgo = getTimeAgo(sub.time);
        const myVote = votes[sub.id] || null;
        const photoHtml = sub.photo
            ? '<img class="feed-photo" src="' + sub.photo + '" alt="">'
            : '<div class="feed-photo-placeholder" style="background:' + (sub.gradient || '#111') + ';"></div>';

        return '<div class="feed-card">'
            + photoHtml
            + '<div class="feed-meta">'
            + '<div class="feed-user">' + escHtml(sub.user) + '</div>'
            + '<div class="feed-time">' + timeAgo + '</div>'
            + '</div>'
            + '<div class="vote-bar">'
            + '<button class="vote-btn vote-btn-up' + (myVote === 'up' ? ' voted' : '') + '" onclick="vote(\'' + sub.id + '\',\'up\')">VALIDE ' + sub.votesUp + '</button>'
            + '<button class="vote-btn vote-btn-down' + (myVote === 'down' ? ' voted' : '') + '" onclick="vote(\'' + sub.id + '\',\'down\')">NAZE ' + sub.votesDown + '</button>'
            + '</div>'
            + '</div>';
    }).join('');
}

function vote(id, type) {
    const votes = JSON.parse(localStorage.getItem('dc_votes') || '{}');
    const submissions = JSON.parse(localStorage.getItem('dc_submissions') || '[]');
    const sub = submissions.find(s => s.id === id);
    if (!sub) return;

    const prev = votes[id];

    if (prev === type) {
        // un-vote
        delete votes[id];
        if (type === 'up') sub.votesUp = Math.max(0, sub.votesUp - 1);
        else sub.votesDown = Math.max(0, sub.votesDown - 1);
    } else {
        // switch or new vote
        if (prev === 'up') sub.votesUp = Math.max(0, sub.votesUp - 1);
        if (prev === 'down') sub.votesDown = Math.max(0, sub.votesDown - 1);
        votes[id] = type;
        if (type === 'up') sub.votesUp++;
        else sub.votesDown++;
    }

    const voteCount = parseInt(localStorage.getItem('dc_vote_count') || '0');
    localStorage.setItem('dc_vote_count', (voteCount + 1).toString());

    localStorage.setItem('dc_votes', JSON.stringify(votes));
    localStorage.setItem('dc_submissions', JSON.stringify(submissions));
    renderFeed();
}

// ─── TOP 3 ───
function renderTop() {
    const now = new Date();
    const months = ['Jan','Fev','Mar','Avr','Mai','Juin','Juil','Aout','Sep','Oct','Nov','Dec'];
    document.getElementById('top-date').textContent = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();

    const submissions = JSON.parse(localStorage.getItem('dc_submissions') || '[]');

    // Today
    const today = submissions.filter(s => s.day === dayOfYear)
        .map(s => ({ ...s, score: s.votesUp - s.votesDown }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);

    const todayContainer = document.getElementById('top-today');
    if (today.length === 0) {
        todayContainer.innerHTML = '<div class="empty-state">PAS ENCORE DE RESULTATS</div>';
    } else {
        todayContainer.innerHTML = today.map((sub, i) => {
            const photoHtml = sub.photo
                ? '<img class="top-photo" src="' + sub.photo + '" alt="">'
                : '<div class="top-photo-placeholder" style="background:' + (sub.gradient || '#111') + ';border-radius:8px;"></div>';
            return '<div class="top-card">'
                + '<div class="top-rank">' + (i + 1) + '</div>'
                + photoHtml
                + '<div class="top-info">'
                + '<div class="top-user">' + escHtml(sub.user) + '</div>'
                + '<div class="top-votes">' + sub.score + ' pts</div>'
                + '</div>'
                + '</div>';
        }).join('');
    }

    // Yesterday
    const yesterday = submissions.filter(s => s.day === dayOfYear - 1)
        .map(s => ({ ...s, score: s.votesUp - s.votesDown }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);

    const yContainer = document.getElementById('top-yesterday');
    if (yesterday.length === 0) {
        yContainer.innerHTML = '<div class="empty-state" style="padding:16px 0;">Aucune donnee</div>';
    } else {
        yContainer.innerHTML = yesterday.map((sub, i) => {
            return '<div class="top-compact">'
                + '<div class="top-compact-rank">' + (i + 1) + '</div>'
                + '<div class="top-compact-user">' + escHtml(sub.user) + '</div>'
                + '<div class="top-compact-votes">' + (sub.votesUp - sub.votesDown) + ' pts</div>'
                + '</div>';
        }).join('');
    }
}

// ─── PROFILE ───
function saveUsername() {
    const val = document.getElementById('username-input').value.trim();
    if (val) localStorage.setItem('dc_username', val);
}

function updateStats() {
    document.getElementById('stat-photos').textContent = localStorage.getItem('dc_photo_count') || '0';
    document.getElementById('stat-votes').textContent = localStorage.getItem('dc_vote_count') || '0';
    document.getElementById('stat-top3').textContent = localStorage.getItem('dc_top3_count') || '0';
}

function resetData() {
    if (confirm('Effacer toutes les donnees ?')) {
        localStorage.removeItem('dc_submissions');
        localStorage.removeItem('dc_votes');
        localStorage.removeItem('dc_photo_count');
        localStorage.removeItem('dc_vote_count');
        localStorage.removeItem('dc_top3_count');
        // Clear fake day keys
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith('dc_fakes_day_')) {
                localStorage.removeItem(key);
                i--;
            }
        }
        location.reload();
    }
}

// ─── SHARE ───
function shareApp() {
    if (navigator.share) {
        navigator.share({ title: 'DARE CAM', text: 'Rejoins le defi photo du jour.', url: location.href });
    } else {
        navigator.clipboard.writeText(location.href).then(() => {
            alert('Lien copie !');
        });
    }
}

// ─── UTILS ───
function getTimeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'maintenant';
    if (mins < 60) return mins + 'min';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h';
    return Math.floor(hrs / 24) + 'j';
}

function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

// ─── START ───
init();
